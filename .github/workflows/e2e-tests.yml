name: E2E Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build project
        run: yarn build

      - name: Create .env file for tests
        run: |
          cat > .env << EOF
          # E2E Test Configuration
          PRIVATE_KEY=${{ secrets.PRIVATE_KEY }}
          PAY_TO_ADDRESS=${{ secrets.PAY_TO_ADDRESS }}
          SERVER_DEPLOYER_PRIVATE_KEY=${{ secrets.PRIVATE_KEY }}
          NETWORK=base-sepolia
          BASE_SEPOLIA_RPC_URL=https://sepolia.base.org
          MCP_SERVER_URL=http://localhost:8000/mcp
          TEST_TIMEOUT=60000
          EOF

      - name: Start MCP Server
        run: yarn start &
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PAY_TO_ADDRESS: ${{ secrets.PAY_TO_ADDRESS }}
          SERVER_DEPLOYER_PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          NETWORK: base-sepolia
          BASE_SEPOLIA_RPC_URL: https://sepolia.base.org

      - name: Wait for server to be ready
        run: |
          echo "Waiting for MCP server to start..."
          sleep 5
          for i in {1..30}; do
            if curl -s http://localhost:8000/mcp > /dev/null 2>&1; then
              echo "Server is ready!"
              exit 0
            fi
            if nc -z localhost 8000 2>/dev/null; then
              echo "Server is ready (port is open)!"
              exit 0
            fi
            echo "Attempt $i: Server not ready yet, waiting..."
            sleep 2
          done
          echo "Server failed to start in time"
          exit 1

      - name: Run E2E Tests (Compile & Analyze)
        env:
          MCP_SERVER_URL: http://localhost:8000/mcp
          PAY_TO_ADDRESS: ${{ secrets.PAY_TO_ADDRESS }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          yarn test tests/e2e/compile-solidity.e2e.test.js
          yarn test tests/e2e/analyze-slither.e2e.test.js

      - name: Run E2E Tests (Compile & Deploy)
        env:
          MCP_SERVER_URL: http://localhost:8000/mcp
          PAY_TO_ADDRESS: ${{ secrets.PAY_TO_ADDRESS }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          SERVER_DEPLOYER_PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: yarn test tests/e2e/compile-deploy.e2e.test.js --testTimeout=120000

      - name: Stop MCP Server
        if: always()
        run: |
          pkill -f "node dist/server/index.js" || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            coverage/
            test-results/
          retention-days: 30
